# HRM Training Stages with Honest Width Validation
# Stage names include width configuration for clarity
# Validation: pair_width must match configured universe size

[[harness.stages]]
name = "convergence_4x4_w4"  # 4 pairs x 4 codec outputs, effective width 4
pair_width = 4
codec_outputs = 4
effective_width = 4
max_training_seconds = 1800
episodes = 100000
bar_sequences_per_episode = 64
min_bar_window = 64
max_bar_window = 192
candles_per_extent = 1000
# HONESTY CHECK: pair_width=4 <= canary_basket.primary_symbols (3) + secondary (2) = 5 ✓

[[harness.stages]]
name = "hrm_24x24_w24"  # 24 pairs x 24 codec outputs, effective width 24
pair_width = 24
codec_outputs = 24
effective_width = 24
max_training_seconds = 3600
episodes = 100000
bar_sequences_per_episode = 100
min_bar_window = 64
max_bar_window = 256
candles_per_extent = 1500
# HONESTY CHECK: pair_width=24 > canary_basket (5), requires full binance_vision symbols (7) + expansion
# WARNING: This stage exceeds current canary basket - mark as SHADOW_ONLY until promotion

[[harness.stages]]
name = "hrm_24x64_w64"  # 64 pairs x 24 codec outputs, effective width 64
pair_width = 64
codec_outputs = 24
effective_width = 64
max_training_seconds = 7200
episodes = 100000
bar_sequences_per_episode = 120
min_bar_window = 64
max_bar_window = 256
candles_per_extent = 2000
# HONESTY CHECK: pair_width=64 >> current universe (7) - REQUIRES full Coinbase Advanced Spot universe
# STAGE BLOCKED: Requires universe expansion to 64+ symbols

[[harness.stages]]
